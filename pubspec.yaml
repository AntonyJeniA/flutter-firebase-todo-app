name: todo_app
description: "A To-Do List app with Firebase Authentication and Realtime Database."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  google_sign_in: ^6.2.1

  # HTTP
  http: ^1.2.2

  # State Management
  provider: ^6.1.2

  # UI & Utilities
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_slidable: ^3.1.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/
